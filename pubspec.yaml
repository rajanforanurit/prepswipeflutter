name: prepswipe
description: PrepSwipe - Competitive Exam Preparation App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  http: ^1.2.2
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  uuid: ^4.4.2
  flutter_card_swiper: ^7.0.2
  share_plus: ^10.0.0
  timeago: ^3.7.1
  url_launcher: ^6.3.1
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/image/prepswipehomescreen.png
    - assets/image/googlelogo.png
    - assets/music/correct_answer.mp3